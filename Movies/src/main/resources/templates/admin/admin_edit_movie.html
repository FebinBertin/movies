<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Movie</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <div class="col-md-8 mx-auto">
    <div class="card p-4">
      <h3>Edit Movie</h3>
      <form th:action="@{/admin/edit}" method="post" th:object="${movie}">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
          <label>Title</label>
          <input class="form-control" th:field="*{title}" required />
        </div>
        <div class="mb-3">
          <label>Description</label>
          <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
        </div>
        <div class="mb-3">
          <label>Poster URL</label>
          <input class="form-control" th:field="*{posterUrl}" />
        </div>
        <div class="mb-3">
          <label>Video URL</label>
          <input class="form-control" th:field="*{videoUrl}" required />
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="submit">Save</button>
          <a class="btn btn-secondary" href="/admin/movies">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
