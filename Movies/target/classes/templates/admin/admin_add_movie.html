<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Movie</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
  <div class="col-md-6 mx-auto">
    <div class="card p-4">
      <h3>Add Movie</h3>
      <form th:action="@{/admin/add}" method="post" th:object="${movie}">
        <div class="mb-3">
          <label>Title</label>
          <input class="form-control" th:field="*{title}" required />
        </div>
        <div class="mb-3">
          <label>Description</label>
          <textarea class="form-control" th:field="*{description}" rows="4"></textarea>
        </div>
        <div class="mb-3">
          <label>Poster URL</label>
          <input class="form-control" th:field="*{posterUrl}" />
        </div>
        <div class="mb-3">
          <label>Video URL</label>
          <input class="form-control" th:field="*{videoUrl}" required />
        </div>
        <button class="btn btn-success">Save</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
