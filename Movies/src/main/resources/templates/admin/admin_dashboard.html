<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Admin Dashboard</a>
    <div>
      <a class="btn btn-outline-light" href="/admin/movies">Manage Movies</a>
      <a class="btn btn-outline-light ms-2" href="/">Home</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card text-center">
        <div class="card-body">
          <h5 class="card-title">Total Movies</h5>
          <p class="card-text" th:text="${totalMovies}">0</p>
          <a href="/admin/movies" class="btn btn-primary">View Movies</a>
        </div>
      </div>
    </div>
  </div>

  <hr class="my-4">

  <h4>Recent Movies</h4>
  <div class="row" th:each="m : ${movies}">
    <div class="col-md-3 mb-3">
      <div class="card h-100">
        <img th:src="${m.posterUrl}" class="card-img-top" style="height:200px;object-fit:cover;">
        <div class="card-body">
          <h5 th:text="${m.title}">Title</h5>
          <p th:text="${m.description}" style="height:60px; overflow:hidden;"></p>
          <div class="d-flex justify-content-between">
            <a th:href="@{/admin/edit/{id}(id=${m.id})}" class="btn btn-sm btn-warning">Edit</a>
            <a th:href="@{/admin/delete/{id}(id=${m.id})}" class="btn btn-sm btn-danger">Delete</a>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
